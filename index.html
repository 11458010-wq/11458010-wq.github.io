<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole</title>
  <style>
    :root {
      --bg-top: #f4b942;
      --bg-bottom: #f7efe2;
      --panel: rgba(255, 248, 237, 0.84);
      --panel-border: rgba(124, 70, 16, 0.18);
      --text-main: #2d1f13;
      --text-soft: #6f553c;
      --accent: #d94f2b;
      --accent-strong: #9f2a18;
      --grass: #5c9f3a;
      --grass-dark: #3f7425;
      --hole: #50301b;
      --mole-face: #7e5440;
      --mole-ear: #624132;
      --mole-nose: #25160f;
      --shadow: 0 20px 50px rgba(71, 39, 7, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.4), transparent 35%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      overflow-x: hidden;
    }

    .phone-stage {
      position: relative;
      width: min(100vw, 390px);
      min-height: 100dvh;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vmax;
      height: 38vmax;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -16vmax;
      right: -10vmax;
      background: rgba(255, 236, 179, 0.85);
    }

    body::after {
      left: -12vmax;
      bottom: -18vmax;
      background: rgba(110, 180, 83, 0.22);
    }

    .page {
      position: relative;
      z-index: 1;
      width: calc(100% - 16px);
      margin: 0 auto;
      padding: 8px 0 10px;
    }

    .designer-credit {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      padding: 7px 10px;
      border: 1px solid rgba(124, 70, 16, 0.14);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 12px;
      letter-spacing: 0.03em;
      background: rgba(255, 248, 237, 0.78);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(71, 39, 7, 0.14);
    }

    .designer-credit strong {
      color: var(--accent-strong);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 8px;
    }

    .hero-card,
    .panel {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 14px;
      animation: rise-in 600ms ease-out;
    }

    .intro-content {
      display: none;
    }

    .hero-card.show-intro .intro-content {
      display: block;
      margin-bottom: 8px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-strong);
      background: rgba(217, 79, 43, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4.5vw, 50px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero-card p {
      margin: 0;
      max-width: 34rem;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.4;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      animation: rise-in 760ms ease-out;
    }

    .stat-box {
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(124, 70, 16, 0.08);
    }

    .stat-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .stat-value {
      font-size: clamp(22px, 2.6vw, 32px);
      font-weight: 700;
      line-height: 1;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 0;
    }

    button,
    select {
      border: 0;
      border-radius: 999px;
      font: inherit;
    }

    button {
      padding: 10px 14px;
      color: #fff9f3;
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      box-shadow: 0 12px 26px rgba(159, 42, 24, 0.25);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(159, 42, 24, 0.3);
      filter: saturate(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    select {
      min-width: 160px;
      padding: 10px 12px;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(124, 70, 16, 0.14);
      cursor: pointer;
    }

    .board-shell {
      padding: 10px;
      animation: rise-in 920ms ease-out;
    }

    .sound-toggle {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(124, 70, 16, 0.14);
      box-shadow: none;
    }

    .intro-toggle {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(124, 70, 16, 0.14);
      box-shadow: none;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .board-title {
      margin: 0;
      font-size: 18px;
    }

    .hint {
      color: var(--text-soft);
      font-size: 12px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .hole {
      position: relative;
      aspect-ratio: 1 / 0.84;
      border: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .hole:disabled {
      cursor: default;
    }

    .hole-ground,
    .hole-rim,
    .mole,
    .score-pop {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .hole-ground {
      bottom: 0;
      width: 100%;
      height: 44%;
      border-radius: 44% 44% 22% 22% / 60% 60% 18% 18%;
      background: linear-gradient(180deg, var(--grass), var(--grass-dark));
      box-shadow: inset 0 10px 0 rgba(255, 255, 255, 0.08);
    }

    .hole-rim {
      bottom: 12%;
      width: 72%;
      height: 22%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, #69402a, var(--hole));
      box-shadow: inset 0 10px 10px rgba(0, 0, 0, 0.24);
      z-index: 3;
    }

    .mole {
      bottom: 12%;
      width: 44%;
      height: 54%;
      transform: translateX(-50%) translateY(78%);
      transition: transform 130ms ease-out;
      z-index: 2;
    }

    .hole.active .mole {
      transform: translateX(-50%) translateY(0);
    }

    .hole.hit .mole {
      transform: translateX(-50%) translateY(10%) scale(0.92);
    }

    .mole-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 100%;
      height: 80%;
      transform: translateX(-50%);
      border-radius: 46% 46% 36% 36%;
      background: linear-gradient(180deg, #9b7156, var(--mole-face));
    }

    .mole-face {
      position: absolute;
      inset: 16% 12% auto;
      height: 54%;
      border-radius: 48%;
      background: #b48768;
    }

    .ear {
      position: absolute;
      top: 10%;
      width: 28%;
      height: 26%;
      border-radius: 50%;
      background: var(--mole-ear);
    }

    .ear.left {
      left: 6%;
    }

    .ear.right {
      right: 6%;
    }

    .eye {
      position: absolute;
      top: 40%;
      width: 8%;
      height: 10%;
      border-radius: 50%;
      background: #1f1009;
    }

    .eye.left {
      left: 28%;
    }

    .eye.right {
      right: 28%;
    }

    .nose {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 16%;
      height: 12%;
      border-radius: 50%;
      transform: translateX(-50%);
      background: var(--mole-nose);
    }

    .score-pop {
      top: 10%;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-strong);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
    }

    .hole.flash .score-pop {
      animation: pop-score 540ms ease-out;
    }

    .status {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(124, 70, 16, 0.08);
      font-size: 13px;
    }

    .status strong {
      color: var(--text-main);
    }

    @keyframes pop-score {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(14px) scale(0.8);
      }
      25% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-24px) scale(1.04);
      }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .board {
        gap: 14px;
      }
    }

    @media (max-width: 560px) {
      .designer-credit {
        top: 8px;
        right: 8px;
        padding: 6px 9px;
        font-size: 11px;
      }

      .page {
        width: min(100% - 12px, 390px);
        padding-top: 6px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }

      .hero-card,
      .stats,
      .board-shell {
        padding: 10px;
      }

      h1 {
        font-size: 34px;
      }

      .board {
        gap: 10px;
      }

      .controls {
        flex-direction: column;
      }

      button,
      select {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .board {
        gap: 10px;
      }

      .stat-box {
        padding: 14px;
      }

      .stat-value {
        font-size: 32px;
      }

      .hole {
        aspect-ratio: 1 / 0.9;
      }

      .hint {
        font-size: 12px;
      }
    }

    @media (min-width: 561px) {
      .phone-stage {
        margin: 10px 0;
        min-height: calc(100dvh - 20px);
        border-radius: 30px;
        border: 1px solid rgba(124, 70, 16, 0.2);
        box-shadow: 0 20px 50px rgba(71, 39, 7, 0.26);
      }
    }
  </style>
</head>
<body>
  <div class="phone-stage">
    <div class="designer-credit">設計者: <strong>李宥叡</strong></div>

    <main class="page">
      <section class="hero">
        <article class="hero-card panel">
          <div class="intro-content">
            <span class="eyebrow">Arcade Garden</span>
            <h1>打地鼠<br>挑戰賽</h1>
            <p>
              在時間內盡量點中冒出的地鼠。難度越高，地鼠出現越快。按下開始後立刻進入 30 秒挑戰。
            </p>
          </div>
          <div class="controls">
            <button id="startButton" type="button">開始遊戲</button>
            <select id="difficulty" aria-label="選擇難度">
              <option value="easy">簡單</option>
              <option value="normal" selected>普通</option>
              <option value="hard">困難</option>
            </select>
            <button id="introToggle" class="intro-toggle" type="button" aria-expanded="false">介紹：顯示</button>
            <button id="soundToggle" class="sound-toggle" type="button" aria-pressed="false">音效：開</button>
          </div>
        </article>

        <aside class="stats panel" aria-label="遊戲資訊">
          <div class="stat-box">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Time</span>
            <span id="time" class="stat-value">30</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Best</span>
            <span id="best" class="stat-value">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Hits</span>
            <span id="hits" class="stat-value">0</span>
          </div>
        </aside>
      </section>

      <section class="board-shell panel">
        <div class="board-header">
          <h2 class="board-title">Mole Field</h2>
          <div class="hint">點擊冒出的地鼠即可得分</div>
        </div>

        <div id="board" class="board" aria-label="打地鼠遊戲盤面"></div>

        <div id="status" class="status">
          <strong>準備好了嗎？</strong> 選好難度後，按下開始遊戲。
        </div>
      </section>
    </main>
  </div>

  <script>
    const board = document.getElementById("board");
    const startButton = document.getElementById("startButton");
    const difficultySelect = document.getElementById("difficulty");
    const introToggleButton = document.getElementById("introToggle");
    const soundToggleButton = document.getElementById("soundToggle");
    const heroCard = document.querySelector(".hero-card");
    const scoreElement = document.getElementById("score");
    const timeElement = document.getElementById("time");
    const bestElement = document.getElementById("best");
    const hitsElement = document.getElementById("hits");
    const statusElement = document.getElementById("status");

    const difficulties = {
      easy: { minDelay: 700, maxDelay: 1150, visibleTime: 760 },
      normal: { minDelay: 480, maxDelay: 900, visibleTime: 640 },
      hard: { minDelay: 300, maxDelay: 650, visibleTime: 500 }
    };

    const state = {
      score: 0,
      timeLeft: 30,
      hits: 0,
      best: Number(localStorage.getItem("mole-best-score") || 0),
      activeIndex: -1,
      running: false,
      soundEnabled: true,
      audioContext: null,
      timerId: null,
      spawnId: null,
      moleTimeoutId: null
    };

    bestElement.textContent = state.best;

    function createHole(index) {
      const hole = document.createElement("button");
      hole.type = "button";
      hole.className = "hole";
      hole.dataset.index = String(index);
      hole.setAttribute("aria-label", `洞口 ${index + 1}`);
      hole.innerHTML = `
        <span class="score-pop">+1</span>
        <span class="mole">
          <span class="ear left"></span>
          <span class="ear right"></span>
          <span class="mole-body"></span>
          <span class="mole-face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="nose"></span>
          </span>
        </span>
        <span class="hole-rim"></span>
        <span class="hole-ground"></span>
      `;
      hole.addEventListener("click", () => hitMole(index));
      return hole;
    }

    function buildBoard() {
      const fragment = document.createDocumentFragment();
      for (let index = 0; index < 9; index += 1) {
        fragment.appendChild(createHole(index));
      }
      board.appendChild(fragment);
    }

    function getHoles() {
      return Array.from(board.querySelectorAll(".hole"));
    }

    function updatePanel() {
      scoreElement.textContent = state.score;
      timeElement.textContent = state.timeLeft;
      hitsElement.textContent = state.hits;
      bestElement.textContent = state.best;
    }

    function resetClasses() {
      getHoles().forEach((hole) => {
        hole.classList.remove("active", "hit", "flash");
      });
      state.activeIndex = -1;
    }

    function clearTimers() {
      clearInterval(state.timerId);
      clearTimeout(state.spawnId);
      clearTimeout(state.moleTimeoutId);
    }

    function ensureAudioContext() {
      if (state.audioContext) {
        if (state.audioContext.state === "suspended") {
          state.audioContext.resume();
        }
        return state.audioContext;
      }

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) {
        return null;
      }

      state.audioContext = new AudioCtx();
      return state.audioContext;
    }

    function playTone(frequency, duration, type, volume, sweepTo) {
      if (!state.soundEnabled) {
        return;
      }

      const context = ensureAudioContext();
      if (!context) {
        return;
      }

      const oscillator = context.createOscillator();
      const gainNode = context.createGain();
      const now = context.currentTime;
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      if (typeof sweepTo === "number") {
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, sweepTo), now + duration);
      }

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.exponentialRampToValueAtTime(volume, now + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      oscillator.connect(gainNode);
      gainNode.connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + duration);
    }

    function playStartSound() {
      playTone(520, 0.08, "triangle", 0.16, 740);
      window.setTimeout(() => {
        playTone(740, 0.11, "triangle", 0.15, 960);
      }, 90);
    }

    function playHitSound() {
      playTone(420, 0.06, "square", 0.1, 690);
    }

    function playEndSound() {
      playTone(380, 0.12, "sine", 0.14, 280);
      window.setTimeout(() => {
        playTone(280, 0.18, "sine", 0.13, 210);
      }, 120);
    }

    function updateSoundToggleText() {
      soundToggleButton.textContent = state.soundEnabled ? "音效：開" : "音效：關";
      soundToggleButton.setAttribute("aria-pressed", String(!state.soundEnabled));
    }

    function toggleSound() {
      state.soundEnabled = !state.soundEnabled;
      if (state.soundEnabled) {
        ensureAudioContext();
        playTone(620, 0.06, "triangle", 0.08, 780);
      }
      updateSoundToggleText();
    }

    function toggleIntro() {
      heroCard.classList.toggle("show-intro");
      const shown = heroCard.classList.contains("show-intro");
      introToggleButton.textContent = shown ? "介紹：隱藏" : "介紹：顯示";
      introToggleButton.setAttribute("aria-expanded", String(shown));
    }

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chooseHoleIndex() {
      const holes = getHoles();
      let nextIndex = randomBetween(0, holes.length - 1);
      while (holes.length > 1 && nextIndex === state.activeIndex) {
        nextIndex = randomBetween(0, holes.length - 1);
      }
      return nextIndex;
    }

    function hideMole() {
      const holes = getHoles();
      if (state.activeIndex >= 0) {
        holes[state.activeIndex].classList.remove("active", "hit");
      }
      state.activeIndex = -1;
    }

    function scheduleSpawn() {
      if (!state.running) {
        return;
      }

      const config = difficulties[difficultySelect.value];
      const delay = randomBetween(config.minDelay, config.maxDelay);
      state.spawnId = window.setTimeout(() => {
        spawnMole();
      }, delay);
    }

    function spawnMole() {
      if (!state.running) {
        return;
      }

      const holes = getHoles();
      hideMole();
      const nextIndex = chooseHoleIndex();
      const targetHole = holes[nextIndex];
      state.activeIndex = nextIndex;
      targetHole.classList.add("active");

      const config = difficulties[difficultySelect.value];
      state.moleTimeoutId = window.setTimeout(() => {
        hideMole();
        scheduleSpawn();
      }, config.visibleTime);
    }

    function endGame() {
      state.running = false;
      clearTimers();
      hideMole();
      playEndSound();
      startButton.disabled = false;
      difficultySelect.disabled = false;

      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem("mole-best-score", String(state.best));
      }

      updatePanel();
      statusElement.innerHTML = `<strong>時間到。</strong> 本回合得分 ${state.score}，成功擊中 ${state.hits} 次。`;
    }

    function startGame() {
      ensureAudioContext();
      clearTimers();
      resetClasses();
      state.score = 0;
      state.hits = 0;
      state.timeLeft = 30;
      state.running = true;
      startButton.disabled = true;
      difficultySelect.disabled = true;
      updatePanel();
      statusElement.innerHTML = "<strong>遊戲開始。</strong> 地鼠已經冒出來了，快點擊。";
      playStartSound();

      state.timerId = window.setInterval(() => {
        state.timeLeft -= 1;
        updatePanel();
        if (state.timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      spawnMole();
    }

    function hitMole(index) {
      if (!state.running || index !== state.activeIndex) {
        return;
      }

      const holes = getHoles();
      const hitHole = holes[index];
      state.score += 1;
      state.hits += 1;
      playHitSound();
      hitHole.classList.add("hit", "flash");
      updatePanel();

      clearTimeout(state.moleTimeoutId);
      window.setTimeout(() => {
        hitHole.classList.remove("flash");
      }, 240);

      hideMole();
      scheduleSpawn();
    }

    startButton.addEventListener("click", startGame);
    introToggleButton.addEventListener("click", toggleIntro);
    soundToggleButton.addEventListener("click", toggleSound);
    buildBoard();
    updateSoundToggleText();
    updatePanel();
  </script>
</body>
</html>
