<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">工程計算機縮圖</title>
  <desc id="desc">手機上的工程計算機畫面，顯示 sin 30 度結果</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2f5ff" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" rx="32" fill="url(#bg)" />

  <g transform="translate(230 45)">
    <rect width="340" height="360" rx="28" fill="#0b1220" opacity="0.92" />
    <rect x="18" y="18" width="304" height="90" rx="16" fill="url(#screen)" />
    <text x="34" y="58" font-size="24" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">sin(30)</text>
    <text x="34" y="92" font-size="34" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-weight="700">0.5</text>

    <g fill="#1f2937">
      <rect x="18" y="124" width="68" height="46" rx="11" />
      <rect x="94" y="124" width="68" height="46" rx="11" />
      <rect x="170" y="124" width="68" height="46" rx="11" />
      <rect x="246" y="124" width="76" height="46" rx="11" fill="#f59e0b" />

      <rect x="18" y="178" width="68" height="46" rx="11" />
      <rect x="94" y="178" width="68" height="46" rx="11" />
      <rect x="170" y="178" width="68" height="46" rx="11" />
      <rect x="246" y="178" width="76" height="46" rx="11" fill="#0ea5e9" />

      <rect x="18" y="232" width="68" height="46" rx="11" />
      <rect x="94" y="232" width="68" height="46" rx="11" />
      <rect x="170" y="232" width="68" height="46" rx="11" />
      <rect x="246" y="232" width="76" height="46" rx="11" fill="#0ea5e9" />

      <rect x="18" y="286" width="144" height="56" rx="12" fill="#334155" />
      <rect x="170" y="286" width="68" height="56" rx="12" fill="#334155" />
      <rect x="246" y="286" width="76" height="56" rx="12" fill="#22c55e" />
    </g>

    <g fill="#f8fafc" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">
      <text x="52" y="147">sin</text>
      <text x="128" y="147">cos</text>
      <text x="204" y="147">tan</text>
      <text x="284" y="147">AC</text>

      <text x="52" y="201">7</text>
      <text x="128" y="201">8</text>
      <text x="204" y="201">9</text>
      <text x="284" y="201">÷</text>

      <text x="52" y="255">4</text>
      <text x="128" y="255">5</text>
      <text x="204" y="255">6</text>
      <text x="284" y="255">×</text>

      <text x="90" y="314">0</text>
      <text x="204" y="314">.</text>
      <text x="284" y="314">=</text>
    </g>
  </g>
</svg>
